<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Product Price Check</title>

<style>

body{
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 15px;
    text-align: center;
}

img{
    width: 95%;
    max-width: 500px;
    height: auto;
    margin: 20px 0;
}

.price{
    font-size: 4rem;
    font-weight: bold;
    color: green;
    margin: 10px 0 20px 0;
}

.name{
    font-size: 2rem;
    font-weight: bold;
    margin: 15px 0;
}

</style>
</head>
<body>

<div id="result">Loading...</div>

<script>

const csvUrl =
'https://docs.google.com/spreadsheets/d/e/2PACX-1vQKBUFk1THtImH4DMiDndK4mGnCx4NNDRv6W0gm_zOgDvJDWGy7u3k9Lj9PVbJSPTuDb4bWKndCJHfc/pub?gid=0&single=true&output=csv';

const sku =
new URLSearchParams(window.location.search).get('sku');

fetch(csvUrl)
.then(response => response.text())
.then(csv => {

    const rows = csv.trim().split('\n');

    for(let i=1;i<rows.length;i++){

        const cols = rows[i].split(',');

        const rowSku = cols[0];

        if(rowSku === sku){

            document.getElementById('result').innerHTML = `
                <div class="name">${cols[1]}</div>

                <img src="${cols[3]}" alt="">

                <div class="price">
                    GYD ${cols[2]}
                </div>
            `;

            return;
        }
    }

    document.getElementById('result').innerHTML =
        '<h2>Product Not Found</h2>';

});

</script>

</body>
</html>
